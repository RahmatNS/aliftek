services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hasnalabs_web
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    env_file:
      - .env.local
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
